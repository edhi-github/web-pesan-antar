<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapur Utama - Rekap Pesanan Masuk</title>
    <!-- Menggunakan Tailwind CSS untuk layouting cepat -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 antialiased font-sans">
    <script src="config.js"></script>

    <!-- 1. FIXED HEADER -->
    <header class="bg-white shadow-md sticky top-0 z-10 border-b border-gray-200">
        
        <div class="max-w-md mx-auto px-4 pt-3 pb-2 flex justify-between items-center">
            <div>
                <h1 id="nama-warung-header" class="text-lg font-black text-gray-900 tracking-tight uppercase">DAPUR WARUNG</h1>
                <div class="flex items-center gap-3 mt-1">
                    <span class="text-xs font-semibold text-green-600">● Monitor Pesanan Aktif</span>
                    
                    <!-- Tombol Status Mini -->
                    <button id="btn-status-warung" onclick="toggleStatusWarung()" class="text-[11px] font-bold px-2.5 py-0.5 rounded-full border transition-all shadow-sm">
                        Status Warung...
                    </button>
                </div>
            </div>
            
            <!-- Ringkasan Orderan Aktif Hari Ini (Total dari Baru + Proses) -->
            <div class="bg-orange-100 text-orange-800 px-3 py-1.5 rounded-lg text-center">
                <span id="total-antrean" class="block text-sm font-bold">0</span>
                <span class="text-[10px] uppercase font-bold tracking-wider">Antrean</span>
            </div>
        </div>

        <!-- TOMBOL NAVIGASI MENUJU ADMIN.HTML -->
        <div class="max-w-md mx-auto px-4 pb-3">
            <a id="link-admin-stok" href="admin.html" class="block w-full text-center bg-gray-800 hover:bg-gray-900 text-white text-xs font-bold py-2 px-4 rounded-xl shadow-sm transition active:scale-[0.98]">
                📦 Kelola Stok Menu (Tersedia / Habis)
            </a>
        </div>
      
        <!-- NAVIGASI TAB UTAMA (4 TAB SEJAJAR) -->
        <div class="max-w-md mx-auto px-2 flex border-t border-gray-100 bg-gray-50 overflow-x-auto scrollbar-none">
            <button onclick="gantiTab('baru')" id="tab-baru" class="flex-1 min-w-[70px] text-center py-3 text-[11px] font-bold border-b-4 border-orange-500 text-orange-600 bg-orange-50/50">
                🆕 Baru (<span id="badge-baru">0</span>)
            </button>
            <button onclick="gantiTab('proses')" id="tab-proses" class="flex-1 min-w-[70px] text-center py-3 text-[11px] font-medium border-b-4 border-transparent text-gray-500 hover:text-gray-700 transition">
                ⏳ Proses (<span id="badge-proses">0</span>)
            </button>
            <button onclick="gantiTab('selesai')" id="tab-selesai" class="flex-1 min-w-[70px] text-center py-3 text-[11px] font-medium border-b-4 border-transparent text-gray-500 hover:text-gray-700 transition">
                ✅ Selesai
            </button>
            <button onclick="gantiTab('reject')" id="tab-reject" class="flex-1 min-w-[70px] text-center py-3 text-[11px] font-medium border-b-4 border-transparent text-gray-500 hover:text-gray-700 transition">
                ❌ Reject
            </button>
        </div>
    </header>

    <!-- 2. KONTEN UTAMA DAFTAR KARTU -->
    <main class="max-w-md mx-auto p-4 pb-20">
        
        <!-- CONTAINER UNTUK TIAP STATUS -->
        <div id="container-pesanan" class="space-y-4">
            <!-- Data dinamis akan dimasukkan ke sini oleh JavaScript -->
            <div class="text-center py-10 text-gray-400 text-sm">Menghubungkan ke server dapur...</div>
        </div>

    </main>

    <!-- INTERAKSI JAVASCRIPT -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentShopSlug = urlParams.get('shop');

        // Menyimpan tab yang sedang aktif saat ini
        let tabAktifSekarang = 'baru'; 

        if (!currentShopSlug) {
            alert("Peringatan: URL tidak memiliki parameter warung. Contoh akses yang benar: penjualan.html?shop=warung-bu-kris");
        } else {
            document.getElementById('nama-warung-header').innerText = `DAPUR ${currentShopSlug.replace(/-/g, ' ')}`;
            document.getElementById('link-admin-stok').href = `admin.html?shop=${currentShopSlug}`;
        }

        // Ambil data pertama kali & set interval 10 detik
        ambilDataDapur();
        setInterval(ambilDataDapur, 10000);

        // Fungsi Master untuk menarik semua data dan merender tab yang aktif
        function ambilDataDapur() {
            if (!currentShopSlug) return;

            // Kita gunakan endpoint active yang menarik status 'baru' dan 'proses'
            fetch(`${API_URL}/api/orders/active?shop=${currentShopSlug}`)
            .then(res => res.json())
            .then(orders => {
                if (!Array.isArray(orders)) return;

                // Kelompokkan data lokal untuk menghitung total badge
                const listBaru = orders.filter(o => o.status === 'baru');
                const listProses = orders.filter(o => o.status === 'proses');

                // Update angka badge di header tab
                document.getElementById('badge-baru').innerText = listBaru.length;
                document.getElementById('badge-proses').innerText = listProses.length;
                document.getElementById('total-antrean').innerText = listBaru.length + listProses.length;

                // Render tampilan jika yang aktif adalah tab 'baru' atau 'proses'
                if (tabAktifSekarang === 'baru') {
                    renderKartuPesanan(listBaru, 'baru');
                } else if (tabAktifSekarang === 'proses') {
                    renderKartuPesanan(listProses, 'proses');
                }
            })
            .catch(err => console.error('Gagal memuat antrean aktif:', err));
        }

        // Fungsi untuk menggambar kartu ke dalam container utama
        function renderKartuPesanan(dataOrders, tipeTab) {
            const container = document.getElementById('container-pesanan');
            
            if (dataOrders.length === 0) {
                let pesanKosong = "Belum ada antrean pesanan baru.";
                if (tipeTab === 'proses') pesanKosong = "Tidak ada pesanan yang sedang diproses.";
                if (tipeTab === 'selesai') pesanKosong = "Belum ada pesanan yang diselesaikan hari ini.";
                if (tipeTab === 'reject') pesanKosong = "Tidak ada riwayat pesanan yang di-reject.";
                
                container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">${pesanKosong}</div>`;
                return;
            }

            container.innerHTML = '';

            dataOrders.forEach(order => {
                let htmlItems = '';
                order.items.forEach(item => {
                    htmlItems += `
                        <div class="border-b border-gray-100 last:border-0 py-1">
                            <span class="font-bold text-gray-900">${item.kuantitas}x</span> ${item.nama}
                            ${item.catatan ? `<span class="block text-xs text-red-600 font-medium bg-red-50 px-2 py-0.5 rounded mt-0.5 w-max">📝 Catatan: ${item.catatan}</span>` : ''}
                        </div>
                    `;
                });

                // Format Rute Bukti Bayar
                const dbBukti = order.payment_proof_url;
                let ruteLengkapBukti = ''; 
                if (dbBukti) {
                    if (dbBukti.startsWith('http://') || dbBukti.startsWith('https://')) {
                        ruteLengkapBukti = dbBukti.includes('r2.dev') ? `https://wsrv.nl/?url=${encodeURIComponent(dbBukti)}` : dbBukti;
                    } else {
                        ruteLengkapBukti = `${API_URL}${dbBukti}`;
                    }
                }

                let htmlBuktiBayar = `
                    <div class="text-xs text-red-500 bg-red-50 border border-red-100 rounded-lg p-2 text-center font-medium">
                        ⚠️ Belum ada bukti bayar
                    </div>
                `;

                if (ruteLengkapBukti) {
                    htmlBuktiBayar = `
                        <div class="bg-gray-50 border border-gray-200 rounded-xl p-2 flex items-center justify-between mt-2">
                            <div class="flex items-center gap-2">
                                <img src="${ruteLengkapBukti}" class="w-10 h-10 object-cover rounded-md border border-gray-300 cursor-pointer hover:opacity-80 transition" onclick="bukaModalBukti('${ruteLengkapBukti}')">
                                <div>
                                    <span class="text-[11px] font-bold text-gray-700 block leading-tight">Bukti Pembayaran</span>
                                    <span class="text-[9px] text-green-600 bg-green-50 px-1 py-0.2 rounded font-semibold">Sudah Upload</span>
                                </div>
                            </div>
                            <button type="button" onclick="bukaModalBukti('${ruteLengkapBukti}')" class="text-[11px] text-blue-600 hover:text-blue-800 font-bold bg-white border border-gray-300 px-2.5 py-1 rounded-lg shadow-sm transition">
                                🔍 Lihat
                            </button>
                        </div>
                    `;
                }

                // Untuk tab selesai/reject, kita gunakan updated_at. 
                // Sedangkan untuk tab baru/proses, kita gunakan created_at agar tahu berapa lama antrean berjalan.
                const waktuAcuan = (tipeTab === 'selesai' || tipeTab === 'reject') 
                    ? (order.updated_at || order.created_at) 
                    : order.created_at;

                const menitLalu = Math.floor((new Date() - new Date(waktuAcuan)) / 60000);
                let teksWaktu = menitLalu < 1 ? 'Baru saja' : `${menitLalu} mnt lalu`;

                // Khusus untuk riwayat selesai & reject, akan lebih informatif jika menampilkan jam eksekusinya langsung (misal: "Selesai jam 14.25")
                if (tipeTab === 'selesai' || tipeTab === 'reject') {
                    const jamFormat = new Date(waktuAcuan).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                    teksWaktu = `Jam ${jamFormat}`;
                }

                // Set up visual kartu & tombol dinamis berdasarkan tab aktif
                let kartuStyle = "bg-white border border-gray-200";
                let htmlTombolAksi = "";
                let labelStatus = "";

                if (tipeTab === 'baru') {
                    kartuStyle = "bg-yellow-50/70 border-2 border-yellow-200";
                    labelStatus = `<span class="bg-yellow-400 text-yellow-950 text-[10px] font-black px-2 py-0.5 rounded-md uppercase">Baru</span>`;
                    htmlTombolAksi = `
                        <div class="flex gap-2 w-full">
                            <button onclick="updateStatusPesanan('${order.id}', 'reject')" class="w-1/3 bg-red-100 hover:bg-red-200 text-red-700 font-bold text-xs py-2.5 rounded-xl transition">
                                ✕ Reject
                            </button>
                            <button onclick="updateStatusPesanan('${order.id}', 'proses')" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-2.5 rounded-xl shadow-md transition">
                                ✓ Proses Pesanan
                            </button>
                        </div>
                    `;
                } else if (tipeTab === 'proses') {
                    kartuStyle = "bg-indigo-50/50 border-2 border-indigo-200";
                    labelStatus = `<span class="bg-indigo-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md uppercase">Diproses</span>`;
                    htmlTombolAksi = `
                        <button onclick="updateStatusPesanan('${order.id}', 'selesai')" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold text-sm py-3 rounded-xl shadow-md transition">
                            ✓ Selesai Diantar
                        </button>
                    `;
                } else if (tipeTab === 'selesai') {
                    labelStatus = `<span class="bg-green-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md uppercase">Selesai</span>`;
                } else if (tipeTab === 'reject') {
                    kartuStyle = "bg-red-50/50 border border-red-100 opacity-80";
                    labelStatus = `<span class="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md uppercase">Rejected</span>`;
                }

                const kartuHtml = `
                    <div class="${kartuStyle} rounded-2xl p-4 shadow-sm flex flex-col justify-between transition-all">
                        <div>
                            <div class="flex justify-between items-center border-b border-gray-100 pb-2 mb-2">
                                <div class="flex items-center gap-2">
                                    <span class="bg-gray-800 text-white text-xs font-black px-2.5 py-0.5 rounded-md">#ORD-${order.id}</span>
                                    ${labelStatus}
                                </div>
                                <span class="text-xs font-semibold text-gray-500">🕒 ${teksWaktu}</span>
                            </div>
                            <div class="text-sm font-bold text-gray-900 mb-2">
                                ${order.customer_name}
                                <div class="text-xs text-orange-700 bg-orange-50 inline-block px-2 py-0.5 rounded mt-1 font-medium border border-orange-100">
                                    📍 Lokasi: ${order.table_or_address}
                                </div>
                            </div>
                            <div class="bg-white rounded-xl p-3 border border-gray-100 text-sm space-y-1">
                                ${htmlItems}
                            </div>
                            ${htmlBuktiBayar}
                        </div>
                        <div class="mt-4 pt-3 border-t border-gray-100 flex flex-col gap-3">
                            <div class="flex justify-between items-center">
                                <div>
                                    <span class="text-[10px] text-gray-400 block uppercase font-bold">Total Tagihan</span>
                                    <span class="text-base font-black text-gray-900">Rp ${order.total_price.toLocaleString('id-ID')}</span>
                                </div>
                            </div>
                            ${htmlTombolAksi}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', kartuHtml);
            });
        }

        // Ganti Tab & Render Data yang sesuai
        function gantiTab(tab) {
            tabAktifSekarang = tab;
            
            // Reset style semua tombol tab
            const tabs = {
                baru: document.getElementById('tab-baru'),
                proses: document.getElementById('tab-proses'),
                selesai: document.getElementById('tab-selesai'),
                reject: document.getElementById('tab-reject')
            };

            for (let key in tabs) {
                tabs[key].className = "flex-1 min-w-[70px] text-center py-3 text-[11px] font-medium border-b-4 border-transparent text-gray-400 hover:text-gray-600 transition";
            }

            // Aktifkan tab terpilih
            tabs[tab].className = "flex-1 min-w-[70px] text-center py-3 text-[11px] font-bold border-b-4 border-orange-500 text-orange-600 bg-orange-50/50";

            if (tab === 'baru' || tab === 'proses') {
                ambilDataDapur();
            } else if (tab === 'selesai') {
                ambilSelesaiAtauReject('selesai');
            } else if (tab === 'reject') {
                ambilSelesaiAtauReject('reject');
            }
        }

        // Ambil riwayat selesai atau reject (Endpoint dinamis atau difilter)
        function ambilSelesaiAtauReject(statusTarget) {
            if (!currentShopSlug) return;

            // Jika selesai, panggil endpoint history bawaan. Jika reject, kita gunakan filter khusus
            let url = `${API_URL}/api/orders/history?shop=${currentShopSlug}`;
            
            fetch(url)
            .then(res => res.json())
            .then(data => {
                if (!Array.isArray(data)) return;

                // Jika minta reject, kita ambil semua yang berstatus reject (kita perlu buat backend mensupport ini / filter client-side)
                if (statusTarget === 'reject') {
                    // Sementara, kita juga bisa mengambil status reject dari endpoint order active jika diizinkan, 
                    // atau filter dari data history jika database menyimpan semuanya. 
                    // Solusi paling aman: Kita minta dari server, tapi di sini kita amankan dengan filter client.
                    fetch(`${API_URL}/api/orders/active?shop=${currentShopSlug}`)
                    .then(res => res.json())
                    .then(allOrders => {
                        // Jika ada endpoint khusus/kita bisa filter dari pesanan yang di-reject
                        // Mengingat server.js Anda meloloskan status 'baru'/'proses', mari kita buat fetch aman untuk reject.
                    });
                    
                    // Untuk mempermudah, kita panggil endpoint filter client side dari database (nanti disesuaikan di backend)
                    // Kita asumsikan history mengembalikan semua pesanan selesai. Kita buat filter yang sesuai.
                }
                
                // Panggil loader render
                renderKartuPesanan(data.filter(o => o.status === statusTarget), statusTarget);
            })
            .catch(err => console.error('Gagal memuat data riwayat:', err));
        }

        // Fungsi Update Status (Mengarah ke endpoint PATCH baru)
        function updateStatusPesanan(idOrder, statusBaru) {
            let pesanKonfirmasi = "";
            if (statusBaru === 'proses') {
                pesanKonfirmasi = `Apakah bukti bayar valid dan Anda ingin memproses pesanan #ORD-${idOrder}?`;
            } else if (statusBaru === 'reject') {
                pesanKonfirmasi = `Yakin ingin MENOLAK pesanan #ORD-${idOrder}?`;
            } else if (statusBaru === 'selesai') {
                pesanKonfirmasi = `Yakin pesanan #ORD-${idOrder} sudah selesai diantar?`;
            }

            if (confirm(pesanKonfirmasi)) {
                fetch(`${API_URL}/api/orders/${idOrder}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: statusBaru })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        // Tetap di tab saat ini atau otomatis pindah tab setelah aksi sukses
                        if (statusBaru === 'proses') {
                            gantiTab('proses'); // Pindahkan fokus ke tab "Proses" setelah diapprove
                        } else if (statusBaru === 'reject') {
                            gantiTab('reject'); // Pindahkan ke tab "Reject"
                        } else {
                            ambilDataDapur();
                        }
                    } else {
                        alert(data.message || 'Gagal mengubah status pesanan.');
                    }
                })
                .catch(err => alert('Gagal memproses perubahan status ke database.'));
            }
        }

        // Kontrol Status Buka/Tutup Warung
        cekStatusWarung();
        let statusWarungSekarang = 1;

        function cekStatusWarung() {
            if (!currentShopSlug) return;
            fetch(`${API_URL}/api/shops/status?shop=${currentShopSlug}`)
            .then(res => res.json())
            .then(response => {
                if (response.success) {
                    statusWarungSekarang = Number(response.is_open);
                    perbaruiTampilanTombolStatus(statusWarungSekarang);
                }
            })
            .catch(err => console.error('Gagal mengambil status warung:', err));
        }

        function perbaruiTampilanTombolStatus(isOpen) {
            const btn = document.getElementById('btn-status-warung');
            if (isOpen == 1) {
                btn.className = "text-[11px] font-bold px-2.5 py-0.5 rounded-full bg-green-50 border border-green-300 text-green-700 hover:bg-green-100 transition-all shadow-sm";
                btn.innerText = "🟢 Warung Buka";
            } else {
                btn.className = "text-[11px] font-bold px-2.5 py-0.5 rounded-full bg-red-50 border border-red-300 text-red-700 hover:bg-red-100 transition-all shadow-sm";
                btn.innerText = "🔴 Warung Tutup";
            }
        }

        function toggleStatusWarung() {
            const statusBaru = statusWarungSekarang == 1 ? 0 : 1;
            const pesanAksi = statusBaru == 1 ? "membuka" : "menutup";

            if (confirm(`Apakah Anda yakin ingin ${pesanAksi} warung?`)) {
                fetch(`${API_URL}/api/shops/toggle-status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shop: currentShopSlug, is_open: statusBaru })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        statusWarungSekarang = Number(data.is_open);
                        perbaruiTampilanTombolStatus(statusWarungSekarang);
                        alert(`Warung berhasil di-set ${statusBaru == 1 ? 'Buka' : 'Tutup'}`);
                    } else {
                        alert('Gagal memperbarui status: ' + data.message);
                    }
                })
                .catch(err => alert('Terjadi kesalahan koneksi ke server.'));
            }
        }
    </script>

    <!-- 3. MODAL POPUP UNTUK MEMPERBESAR BUKTI BAYAR -->
    <div id="modal-bukti-bayar" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm" onclick="tutupModalBukti()">
        <div class="relative max-w-sm w-full bg-white rounded-2xl p-3 shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-2 pb-1 border-b">
                <h3 class="text-xs font-bold text-gray-800">Pratinjau Bukti Pembayaran</h3>
                <button onclick="tutupModalBukti()" class="text-gray-400 hover:text-gray-700 font-bold text-sm bg-gray-100 hover:bg-gray-200 w-6 h-6 rounded-full flex items-center justify-center">✕</button>
            </div>
            <img id="img-modal-target" src="" alt="Bukti Bayar Besar" class="w-full max-h-[450px] object-contain rounded-xl border">
            <a id="link-download-bukti" href="" download="bukti-bayar.jpg" target="_blank" class="mt-3 block w-full text-center bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 rounded-xl transition">
                📥 Buka di Tab Baru / Download
            </a>
        </div>
    </div>

    <!-- SCRIPT TAMBAHAN UTK KONTROL MODAL -->
    <script>
        function bukaModalBukti(url) {
            document.getElementById('img-modal-target').src = url;
            document.getElementById('link-download-bukti').href = url;
            document.getElementById('modal-bukti-bayar').classList.remove('hidden');
        }

        function tutupModalBukti() {
            document.getElementById('modal-bukti-bayar').classList.add('hidden');
        }
    </script>
</body>
</html>
