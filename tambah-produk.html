<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penjual - Tambah/Edit Produk </title>
    
    <!-- SCRIPT PROTEKSI LOGIN -->
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true' || new URLSearchParams(window.location.search).get('shop') !== localStorage.getItem('current_shop_slug')) {
            alert("Akses Ditolak!");
            window.location.href = "login.html";
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 antialiased font-sans">
    <script src="config.js"></script>

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-md flex flex-col justify-between">
        <!-- HEADER -->
        <header class="p-4 border-b border-gray-200 flex items-center gap-3">
            <a id="link-kembali-admin" href="#" class="text-gray-500 hover:text-gray-700 text-xl font-bold">⬅️</a>
            <div>
                <h1 id="title-page" class="text-base font-black text-gray-900">MANAJEMEN MENU</h1>
                <p id="desc-page" class="text-xs text-gray-500">Tambah item produk/makanan baru</p>
            </div>
        </header>

        <!-- FORM INPUT -->
        <main class="p-4 flex-1">
            <form id="form-produk" onsubmit="simpanProduk(event)" class="space-y-4">
                
                <!-- Nama Produk -->
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nama Produk / Menu</label>
                    <input type="text" id="nama_produk" required placeholder="Contoh: Ayam Penyet Sambal Korek" 
                        class="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-orange-500 focus:outline-none transition">
                </div>

                <!-- Kategori & Harga -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Kategori</label>
                        <select id="kategori" class="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-orange-500 focus:outline-none transition bg-white">
                            <option value="Makanan">Makanan</option>
                            <option value="Minuman">Minuman</option>
                            <option value="Cemilan">Cemilan</option>
                            <option value="Paket">Paket Hemat</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Harga (Rp)</label>
                        <input type="number" id="harga" required placeholder="25000" 
                            class="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-orange-500 focus:outline-none transition">
                    </div>
                </div>

                <!-- Estimasi Stok Produk -->
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Estimasi Stok Awal</label>
                    <input type="number" id="stok" required value="20" placeholder="Default: 20" 
                        class="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-orange-500 focus:outline-none transition">
                </div>

                <!-- Deskripsi Menu -->
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Deskripsi Menu (Opsional)</label>
                    <textarea id="deskripsi" rows="3" placeholder="Jelaskan detail menu, misal tingkat kepedasan..." 
                        class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-orange-500 focus:outline-none transition"></textarea>
                </div>

                <!-- Pilihan Upload Gambar Manual -->
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Foto Produk</label>
                    
                    <div onclick="bukaPilihanMedia()" class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center bg-gray-50 hover:bg-gray-100 transition cursor-pointer relative">
                        <input type="file" id="foto_galeri" accept="image/*" onchange="previewFoto(this)" class="hidden">
                        <input type="file" id="foto_kamera" accept="image/*" capture="environment" onchange="previewFoto(this)" class="hidden">
                        
                        <div id="tempat-instruksi">
                            <span class="text-2xl block">📸</span>
                            <span class="text-xs text-gray-500 font-medium block mt-1">Ketuk untuk pilih Foto / Kamera</span>
                            <span class="text-[10px] text-gray-400 block">(Format: JPG, PNG, WEBP)</span>
                        </div>

                        <div id="kotak-preview" class="hidden flex flex-col items-center">
                            <img id="img-preview" src="#" alt="Preview" class="max-h-40 rounded-lg object-cover mb-2 shadow-sm">
                            <span class="text-xs text-orange-600 font-bold">Ganti Foto / Ambil Ulang</span>
                        </div>
                    </div>
                </div>

                <!-- Tombol Submit -->
                <button type="submit" id="btn-submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black text-sm py-3.5 rounded-xl shadow-md transition mt-6">
                    🚀 SIMPAN KE MENU WARUNG
                </button>
            </form>
        </main>
    </div>

    <!-- MODAL PILIHAN MEDIA -->
    <div id="modal-opsi" class="fixed inset-0 bg-black/50 z-50 flex items-end justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-white w-full max-w-md rounded-t-2xl p-5 space-y-4 shadow-xl transform translate-y-full transition-transform duration-200">
            <div class="text-center">
                <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wide">Pilih Sumber Foto</h3>
                <p class="text-xs text-gray-400 mt-0.5">Silakan pilih cara untuk menambahkan gambar</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button type="button" onclick="pilihKamera()" class="flex flex-col items-center justify-center p-4 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-xl transition">
                    <span class="text-3xl mb-1">📸</span>
                    <span class="text-xs font-bold text-gray-700">Kamera Langsung</span>
                </button>
                <button type="button" onclick="pilihGaleri()" class="flex flex-col items-center justify-center p-4 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-xl transition">
                    <span class="text-3xl mb-1">🖼️</span>
                    <span class="text-xs font-bold text-gray-700">Galeri / File</span>
                </button>
            </div>
            <button type="button" onclick="tutupPilihanMedia()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-bold py-3 rounded-xl transition">
                Batal
            </button>
        </div>
    </div>

    <!-- SCRIPT LOGIK INTERAKSI -->
    <script>
        const API_BASE = `${API_URL}/api/products`;        
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const currentShopSlug = urlParams.get('shop');
        
        const shopSlug = currentShopSlug || localStorage.getItem('current_shop_slug');
        let activeFile = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (!shopSlug) {
                alert('Peringatan: Slug Warung (?shop=...) tidak ditemukan.');
            } else {
                document.getElementById('link-kembali-admin').href = `admin.html?shop=${shopSlug}`;
                localStorage.setItem('current_shop_slug', shopSlug);
            }

            if (productId) {
                document.getElementById('title-page').innerText = "EDIT MENU";
                document.getElementById('desc-page').innerText = "Ubah detail item produk/makanan";
                document.getElementById('btn-submit').innerText = "💾 PERBARUI MENU WARUNG";
                loadProductData(productId);
            }
        });

        function bukaPilihanMedia() {
            const modal = document.getElementById('modal-opsi');
            const content = modal.querySelector('div');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('translate-y-full');
            }, 10);
        }

        function tutupPilihanMedia() {
            const modal = document.getElementById('modal-opsi');
            const content = modal.querySelector('div');
            modal.classList.add('opacity-0');
            content.classList.add('translate-y-full');
            setTimeout(() => { modal.classList.add('hidden'); }, 200);
        }

        function pilihKamera() { tutupPilihanMedia(); document.getElementById('foto_kamera').click(); }
        function pilihGaleri() { tutupPilihanMedia(); document.getElementById('foto_galeri').click(); }

        function previewFoto(input) {
            const Skinner = document.getElementById('tempat-instruksi');
            const kotakPreview = document.getElementById('kotak-preview');
            const imgPreview = document.getElementById('img-preview');

            if (input.files && input.files[0]) {
                activeFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgPreview.src = e.target.result;
                    Skinner.classList.add('hidden');
                    kotakPreview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // FUNGSI UTAMA LOAD DATA EDIT (DENGAN MEMBACA STOK)
        function loadProductData(id) {
            // Fetch 1: Ambil info produk tunggal dengan x-shop-id header[cite: 7]
            fetch(`${API_BASE}/${id}`, {
                headers: {
                    'x-shop-id': localStorage.getItem('shop_id')
                }
            })
                .then(res => {
                    if(!res.ok) throw new Error('Gagal mengambil data produk');
                    return res.json();
                })
                .then(response => {
                    const produk = response.data || response;
                    
                    document.getElementById('nama_produk').value = produk.name || produk.nama || produk.nama_produk || '';
                    document.getElementById('kategori').value = produk.category || produk.kategori || 'Makanan';
                    document.getElementById('harga').value = produk.price || produk.harga || '';
                    document.getElementById('deskripsi').value = produk.description || produk.deskripsi || '';
                    document.getElementById('stok').value = produk.stock !== undefined ? produk.stock : 20; 
                    
                    const dbFoto = produk.image_url || produk.foto || produk.foto_produk;
                    if (dbFoto) {
                        const imgPreview = document.getElementById('img-preview');
                        const instruksi = document.getElementById('tempat-instruksi');
                        const kotakPreview = document.getElementById('kotak-preview');
                        
                        let ruteFoto = dbFoto;
                        if (!dbFoto.startsWith('http') && !dbFoto.startsWith('https')) {
                            ruteFoto = `${API_URL}${dbFoto}`;
                        } else if (dbFoto.includes('r2.dev')) {
                            ruteFoto = `https://wsrv.nl/?url=${encodeURIComponent(dbFoto)}`;
                        }
                        
                        imgPreview.src = ruteFoto;
                        instruksi.classList.add('hidden');
                        kotakPreview.classList.remove('hidden');
                    }
                })
                .catch(err => {
                    alert('Gagal memuat data produk: ' + err.message);
                });
        }

        // FUNGSI MULTIPART FORM DATA SUBMIT
        function simpanProduk(event) {
            event.preventDefault();

            if (!shopSlug) {
                alert('Gagal menyimpan: Parameter Toko (shop) kosong/tidak valid.');
                return;
            }

            if (!productId && !activeFile) {
                alert('Silakan pilih atau ambil foto produk terlebih dahulu.');
                return;
            }

            const btnSubmit = document.getElementById('btn-submit');
            const originalText = btnSubmit.innerText;
            btnSubmit.innerText = "⏳ Sedang Menyimpan...";
            btnSubmit.disabled = true;

            const formData = new FormData();
            formData.append('shop', shopSlug); 
            formData.append('name', document.getElementById('nama_produk').value);
            formData.append('category', document.getElementById('kategori').value);
            formData.append('price', document.getElementById('harga').value);
            formData.append('description', document.getElementById('deskripsi').value);
            formData.append('stock', document.getElementById('stok').value); 
            
            if (activeFile) {
                formData.append('foto_produk', activeFile);
            }

            let url = API_BASE;
            let method = 'POST';

            if (productId) {
                url = `${API_BASE}/${productId}`;
                method = 'POST';
                formData.append('_method', 'PUT');
            }

            // Fetch 2: Simpan produk baru / update data dengan x-shop-id header[cite: 7]
            fetch(url, {
                method: method,
                headers: {
                    'x-shop-id': localStorage.getItem('shop_id')
                },
                body: formData
            })
            .then(async res => {
                // Cek apakah response berupa JSON
                const contentType = res.headers.get("content-type");
                let data;
                
                if (contentType && contentType.includes("application/json")) {
                    data = await res.json();
                } else {
                    // Jika server mengembalikan HTML (Error 404/500), tangkap sebagai teks
                    const textError = await res.text();
                    throw new Error(`Server Error (${res.status}): Terjadi kesalahan pada server/route.`);
                }

                if (!res.ok) {
                    throw new Error(data.message || 'Gagal menyimpan data produk');
                }

                return data;
            })
            .then(data => {
                alert('Sukses! Data menu berhasil disimpan.');
                window.location.href = `admin.html?shop=${shopSlug}`;
            })
            .catch(err => {
                console.error(err);
                alert('Terjadi kesalahan: ' + err.message);
            })
            .finally(() => {
                btnSubmit.innerText = originalText;
                btnSubmit.disabled = false;
            });
        }
    </script>
</body>
</html>
