<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buka Warung Baru - Platform Multi-Warung</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans flex items-center justify-center min-h-screen p-4">
    <script src="config.js"></script>

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-gray-100 p-6">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">Mulai Warung Digitalmu</h1>
            <p class="text-sm text-gray-500 mt-1">Daftarkan warung Anda dan dapatkan link aplikasi instan</p>
        </div>

        <!-- FORM PENDAFTARAN -->
        <form id="form-daftar-warung" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nama Warung</label>
                <input type="text" id="nama-warung" required placeholder="Contoh: Warung Bu Kris" 
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nama Pemilik</label>
                <input type="text" id="pemilik-warung" required placeholder="Nama Anda" 
                       class="w-full px-3 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 text-sm">
            </div>

            <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl shadow-md transition active:scale-[0.99]">
                🚀 Buat Warung & Ambil Link
            </button>
        </form>

        <!-- KOTAK HASIL (SEMBUNYI DI AWAL) -->
        <div id="kotak-hasil" class="mt-6 p-4 bg-green-50 border border-green-200 rounded-2xl hidden space-y-4">
            <div class="text-center text-green-800 font-bold text-sm">
                🎉 Warung Berhasil Dibuat!
            </div>
            
            <div class="space-y-2">
                <div>
                    <span class="block text-[10px] font-bold text-gray-400 uppercase">🔗 Link Pembeli (Sebarkan ke Pelanggan):</span>
                    <div class="flex gap-1 mt-1">
                        <input type="text" id="link-pembeli" readonly class="w-full p-2 bg-white border border-gray-200 rounded-lg text-xs font-mono text-gray-600">
                    </div>
                </div>

                <div>
                    <span class="block text-[10px] font-bold text-gray-400 uppercase">🔑 Link Penjual (Dapur & Stok - Rahasia):</span>
                    <div class="flex gap-1 mt-1">
                        <input type="text" id="link-penjual" readonly class="w-full p-2 bg-white border border-gray-200 rounded-lg text-xs font-mono text-gray-600">
                    </div>
                </div>
            </div>
            
            <p class="text-[11px] text-gray-500 text-center italic">Silakan simpan/bookmark kedua link di atas untuk mengelola warung Anda.</p>
        </div>
    </div>

    <script>
        //const API_URL = 'http://172.16.12.187:3000';

        document.getElementById('form-daftar-warung').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const namaWarung = document.getElementById('nama-warung').value;
            const pemilikWarung = document.getElementById('pemilik-warung').value;

            // Tembak pendaftaran ke Backend
            fetch(`${API_URL}/api/shops/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    shop_name: namaWarung, 
                    owner_name: pemilikWarung 
                })
            })
            .then(res => res.json())
            .then(response => {
                if(response.success) {
                    // Backend mengembalikan slug unik, misal: "warung-bu-kris"
                    const slug = response.data.slug; 
                    
                    // Generate Link Berdasarkan Lokasi Domain Saat Ini
                    const domainAsli = window.location.origin + window.location.pathname.replace('daftar-warung.html', '');
                    
                    document.getElementById('link-pembeli').value = `${domainAsli}index.html?shop=${slug}`;
                    document.getElementById('link-penjual').value = `${domainAsli}penjualan.html?shop=${slug}`;
                    
                    // Tampilkan kotak hasil
                    document.getElementById('kotak-hasil').classList.remove('hidden');
                } else {
                    alert('Gagal mendaftar: ' + response.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert('Gagal menghubungi server.');
            });
        });
    </script>
</body>
</html>
